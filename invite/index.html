<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TalkBingo — 친구 초대</title>
<meta name="description" content="친구가 TalkBingo 게임에 초대했어요. 앱에서 바로 입장하세요." />
<meta name="theme-color" content="#0C0219" />
<meta name="robots" content="noindex" />
<style>
  :root {
    --bg: #0C0219;
    --surface1: #140630;
    --surface2: #1A0A2E;
    --content1: #FFFFFF;
    --content2: #A89DB8;
    --host: #BD0558;
    --host-end: #FF0077;
    --guest: #430887;
    --accent: #00F3FF;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg);
    color: var(--content1); font-family: -apple-system, BlinkMacSystemFont,
    "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif; }
  body { display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 24px; text-align: center;
    background: radial-gradient(ellipse at top, rgba(189,5,88,0.25), transparent 60%),
                radial-gradient(ellipse at bottom, rgba(67,8,135,0.25), transparent 60%),
                var(--bg); }
  .wordmark { font-size: 13px; letter-spacing: 0.32em; color: var(--content2);
    font-weight: 800; margin-bottom: 32px; }
  h1 { font-size: 22px; font-weight: 800; margin: 0 0 8px; line-height: 1.35; }
  .sub { font-size: 14px; color: var(--content2); margin: 0 0 28px; }
  .code-card { background: var(--surface1); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px; padding: 18px 24px; margin-bottom: 28px;
    min-width: 240px; }
  .code-label { font-size: 11px; letter-spacing: 0.18em; color: var(--content2);
    text-transform: uppercase; margin-bottom: 8px; }
  .code { font-family: "SFMono-Regular", Consolas, monospace; font-size: 32px;
    font-weight: 800; letter-spacing: 0.08em; color: var(--content1); }
  .cta { display: inline-flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, var(--host), var(--host-end));
    color: white; text-decoration: none; padding: 16px 32px; border-radius: 40px;
    font-weight: 800; font-size: 16px; min-width: 220px;
    box-shadow: 0 8px 24px rgba(189,5,88,0.45);
    transition: transform 0.15s ease; }
  .cta:active { transform: scale(0.96); }
  .hint { font-size: 12px; color: var(--content2); margin: 24px 0 12px; }
  .stores { display: flex; gap: 12px; }
  .store { background: rgba(255,255,255,0.06); color: var(--content1);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
    padding: 10px 18px; font-size: 13px; font-weight: 600;
    text-decoration: none; }
  .store:active { background: rgba(255,255,255,0.12); }
</style>
</head>
<body>
  <div class="wordmark">TALKBINGO</div>
  <h1>친구가 게임에 초대했어요</h1>
  <p class="sub">아래 버튼을 누르면 앱이 열려요.</p>
  <div class="code-card">
    <div class="code-label">초대 코드</div>
    <div class="code" id="code">—</div>
  </div>
  <a class="cta" id="open" href="#">앱에서 열기</a>
  <p class="hint">앱이 설치되어 있지 않다면</p>
  <div class="stores">
    <a class="store" href="https://play.google.com/store/apps/details?id=com.talkbingo.app">Google Play</a>
    <a class="store" href="https://apps.apple.com/app/talkbingo/id6745692030">App Store</a>
  </div>
<script>
  (function () {
    var params = new URLSearchParams(location.search);
    var code = (params.get('code') || '').trim().toUpperCase();
    var deepLink = 'talkbingo://join?code=' + encodeURIComponent(code);
    document.getElementById('code').textContent = code || '—';
    document.getElementById('open').setAttribute('href', deepLink);
    // Best-effort auto-launch — in-app browsers forward unknown schemes
    // to the OS, so this opens the app if installed. If the scheme is
    // blocked the user can still tap the CTA manually.
    if (code) {
      setTimeout(function () {
        try { window.location.href = deepLink; } catch (_) {}
      }, 200);
    }
  })();
</script>
</body>
</html>
