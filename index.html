<script>
  // Invite-link bypass: when someone receives the share URL inside a
  // messenger's in-app browser (KakaoTalk/Line/WhatsApp/Telegram/etc.),
  // App Link / Universal Link verification doesn't fire and we'd just
  // show the demo page. Detect ?code= and hand off to /invite/ which
  // attempts the custom scheme (talkbingo://) — that one IS forwarded
  // to the OS by every in-app browser.
  (function () {
    try {
      var params = new URLSearchParams(location.search);
      var code = (params.get('code') || '').trim().toUpperCase();
      if (code && /^[A-Z0-9]{4,8}$/.test(code)) {
        location.replace('/invite/?code=' + encodeURIComponent(code));
      }
    } catch (_) { /* fall through to demo */ }
  })();
</script>

  /* ── demo chrome ── */

    color:rgba(255,255,255,.55);font-family:'EliceDigitalCodingverH',monospace;}
  /* center HUD (between boards on desktop) */
  .centerHud{flex:0 0 clamp(180px,20vw,240px);display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:16px;text-align:center;align-self:center;position:relative;}
  .centerHud .arrow{color:#00F3FF;line-height:1;
    text-shadow:0 0 18px rgba(0,243,255,.85), 0 0 36px rgba(0,243,255,.4);
    animation:pulseGlow 1.6s ease-in-out infinite;
    position:absolute;top:50%;transform:translateY(-50%);
    display:flex;align-items:center;gap:0;font-weight:900;}
  .centerHud .arrow span{display:inline-block;}
  .centerHud .arrow.left{left:-44px;}
  .centerHud .arrow.right{right:-44px;}
  .centerHud .instr{word-break:keep-all;}
  .centerHud .instr{font-size:clamp(15px,1.6vw,18px);font-weight:700;color:#fff;line-height:1.55;
    font-family:'EliceDigitalBaeum',sans-serif;}
  .centerHud .proc{display:flex;gap:7px;justify-content:center;}
  .centerHud .proc span{width:9px;height:9px;border-radius:50%;background:#00F3FF;animation:procDot 1s ease-in-out infinite;}
  .centerHud .proc span:nth-child(2){animation-delay:.16s}
  .centerHud .proc span:nth-child(3){animation-delay:.32s}
  @keyframes procDot{0%,100%{opacity:.3;transform:translateY(0)}50%{opacity:1;transform:translateY(-5px)}}

  /* ===== Mobile: top HUD + swipeable board cards ===== */
  /* IMPORTANT: order matters. last declaration wins, so 100dvh (visible
     viewport, excludes URL bar/toolbar) must come AFTER the 100vh fallback. */
  #stage.m{position:relative;flex-direction:column;align-items:stretch;justify-content:flex-start;padding:8px 0 0;gap:4px;
    height:100vh;height:100dvh;max-height:100dvh;}
  .mTopHud{position:relative;display:flex;flex-direction:column;align-items:center;gap:6px;padding:4px 44px 0;text-align:center;}
  .mTopHud .arrow{display:none;}
  .mTopHud .instr{font-size:20px;font-weight:800;color:#fff;line-height:1.35;letter-spacing:-0.01em;transition:opacity .25s ease;}
  /* Language-aware fonts per design system: Alexandria for EN, EliceDigitalBaeum for KO */
  .mTopHud.ko .instr, .mTopHud.ko .swipeHint{font-family:'EliceDigitalBaeum',system-ui,sans-serif;}
  .mTopHud.en .instr, .mTopHud.en .swipeHint{font-family:'Alexandria',system-ui,sans-serif;}
  .mTopHud .proc{display:flex;gap:7px;justify-content:center;}
  .mTopHud .proc span{width:9px;height:9px;border-radius:50%;background:#00F3FF;animation:procDot 1s ease-in-out infinite;}
  .mTopHud .proc span:nth-child(2){animation-delay:.16s} .mTopHud .proc span:nth-child(3){animation-delay:.32s}

  .mGuide .mArrow{font-size:30px;line-height:1;}
  .mGuide .mLabel{font-size:13px;font-weight:700;letter-spacing:.01em;}

  #intro .features{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;

  #intro .features span{display:flex;align-items:center;justify-content:center;text-align:center;

  /* Feature info — absolutely positioned inside .features so it covers
     exactly the 6-chip area (Hub V4 expanded-slot pattern). JS sets
     left/top/width/height so it can grow out of the tapped chip's
     bounding box on open instead of just fading in. No backdrop;
     outside-click is handled in JS. */
  #intro .features .fInfo{position:absolute;left:0;top:0;width:100%;height:100%;
    display:none;
    background:#1A0A2E;border:1px solid rgba(255,0,119,.4);border-radius:18px;
    padding:18px 20px;box-shadow:0 18px 40px rgba(0,0,0,.55);
    flex-direction:column;justify-content:center;text-align:left;z-index:5;
    overflow:hidden;box-sizing:border-box;}

    #intro .features{grid-template-columns:repeat(2,1fr);gap:8px;margin-top:20px;}
    #intro .features span{padding:11px 10px;font-size:11.5px;}
    #intro .features .fInfo{padding:14px 16px;border-radius:14px;}
    #intro .features .fInfo h3{font-size:13px;margin-bottom:4px;}
    #intro .features .fInfo p{font-size:12px;line-height:1.45;}
  }
  #intro .introBtn{border:0;cursor:pointer;color:#fff;font-weight:800;font-size:clamp(15px,4.2vw,17px);

    padding:clamp(15px,4vw,18px) clamp(30px,9vw,42px);border-radius:40px;white-space:nowrap;
    background:linear-gradient(135deg,#BD0558,#FF0077);box-shadow:0 12px 30px rgba(189,5,88,.55);
    animation:introUp .55s ease .72s both, turnPillPulse 2.4s ease-in-out 1.6s infinite;}
  /* Demo info toast — fires from bundle.js when a feature is disabled in
     the demo (mini-games on cell attacks and locked cells). Bottom-center,
     auto-fades after ~3.2s. */

    transform:translate(-50%,30px);max-width:min(340px,86vw);

</div>

<div id="tbToast"></div>

<div id="cta"><div class="card">
  <h2>🎉 빙고!</h2>
  <p>게임 체험이 아쉬웠나요?<br/>더 다양한 서비스가 앱에 준비되어 있습니다.</p>
  <button class="back" onclick="tbDemoBack()">← 되돌아 가기</button>
  <button class="dl" onclick="window.open('https://apps.apple.com/app/id6759347728','_blank')">앱 다운로드 ↓</button>
  <button class="again" onclick="location.reload()">다시 해보기</button>
</div></div>

<script>
  // ── Intro i18n (KO default) ──
  const INTRO_I18N = {
    ko: {
      slogan: '빙고는 핑계일 뿐 —<br>모든 답에서 진짜 대화가 시작돼요',
      button: '체험하러 가기 ▶',
      features: [
        ['맞춤 질문',     'AI가 두 사람의 관계·나이·성별을 살펴 진짜 궁금해할 질문만 골라줘요.'],
        ['음성 → 텍스트', '답하기 귀찮을 땐 말로! 자동으로 텍스트로 바뀌어 대화가 끊기지 않아요.'],
        ['미니게임',     '빙고 칸 안에 도전 미니게임이 숨어 있어, 누구든 빙고 라인을 만들 수 있어요.'],
        ['다국어',       '한국어·영어를 자유롭게 오가며 글로벌 친구·연인과도 같은 게임을 즐겨요.'],
        ['커뮤니티',     '게임이 끝나면 다른 사용자들의 익명 답변·반응을 둘러보며 공감대를 넓혀요.'],
        ['게임 기록',     '친구별 게임 히스토리와 채팅이 자동 보관, 언제든 추억으로 돌아갈 수 있어요.']
      ]
    },
    en: {
      slogan: 'Bingo is just the excuse —<br>real conversations start with every answer',
      button: 'Try the demo ▶',
      features: [
        ['Tailored Questions', "AI picks questions based on each player's relationship, age, and gender."],
        ['Voice to Text',      'Speak your answer — it gets transcribed instantly so the chat keeps flowing.'],
        ['Mini Games',         'Hidden skill challenges inside bingo cells let anyone clear a line.'],
        ['Multilingual',       'Switch between Korean and English freely to play with friends abroad.'],
        ['Community',          'Browse anonymous answers and reactions from other players after each game.'],
        ['Game History',       'Per-friend chat history is auto-saved — revisit your memories anytime.']
      ]
    }
  };
  // Demo info toast — fired from bundle.js or this file when a feature
  // is disabled / a hint should surface. `kind`:
  //   - 'attack'  — cell-attack mini-game (disabled in demo)
  //   - 'unlock'  — locked-cell mini-game (disabled in demo)
  //   - 'chatTip' — gentle nudge to try the chat input mid-demo
  //   - true / false  — legacy: true = 'attack', false = 'unlock'
  // Auto-dismisses after ~3.2s.
  let __tbToastTimer = null;
  window.__tbDemoToast = function(kind, lang){
    const el = document.getElementById('tbToast');
    if (!el) return;
    const ko = lang !== 'en';
    // Normalize legacy boolean signature so old call sites stay valid.
    if (kind === true)  kind = 'attack';
    if (kind === false) kind = 'unlock';
    let msg;
    if (kind === 'attack'){
      msg = ko
        ? '셀 공격 미니게임은 실제 앱에서 즐길 수 있어요 💜'
        : 'Cell-attack mini-games are available in the full app 💜';
    } else if (kind === 'unlock'){
      msg = ko
        ? '잠긴 셀 미니게임은 실제 앱에서 즐길 수 있어요 💜'
        : 'Locked-cell mini-games are available in the full app 💜';
    } else if (kind === 'chatTip'){
      msg = ko
        ? '💬 하단 메시지 입력란에서 자유롭게 대화도 나눠보세요'
        : '💬 Try the message bar below — chat freely with your partner';
    } else {
      return;
    }
    el.textContent = msg;
    el.classList.add('on');
    clearTimeout(__tbToastTimer);
    __tbToastTimer = setTimeout(() => el.classList.remove('on'), 3200);
  };
  // Schedule the chat-input nudge once per demo session, ~10s after the
  // user enters the game (long enough to look around but before they
  // wander off). enterDemo() calls scheduleChatTip.
  let __tbChatTipScheduled = false;
  function scheduleChatTip(){
    if (__tbChatTipScheduled) return;
    __tbChatTipScheduled = true;
    setTimeout(() => {
      const lang = (window.__tbCurrentLang || 'ko');
      window.__tbDemoToast('chatTip', lang);
    }, 10000);
  }

  // Embed context: 'app' (talkbingo.app, download is the end) | 'company' (cammuplabs.com, allow going back).
  // From ?ctx= query (prototype) or a pre-set window.__TB_CTX (embed script can set it from data-ctx).
  window.__TB_CTX = (new URLSearchParams(location.search).get('ctx')) || window.__TB_CTX || 'app';
  function tbDemoBack(){
    var ctx = window.__TB_CTX || 'app';
    // inapp: deep-link back into the TalkBingo app (OS dismisses the in-app
    // browser and brings the app to the foreground / home screen).
    if (ctx === 'inapp') {
      var ko = (window.__TB_LANG || 'ko') !== 'en';
      var ctaP = document.querySelector('#cta p');

      // If the OS actually switches apps, this page becomes hidden — cancel
      // the fallback message in that case.
      var fallbackTimer = setTimeout(function(){
        if (ctaP) {
          ctaP.innerHTML = ko
            ? '상단의 <strong>✕</strong> 버튼을 눌러<br>앱으로 돌아가세요'
            : 'Tap the <strong>✕</strong> button above<br>to return to the app';
        }
      }, 1500);
      var onHide = function(){
        if (document.hidden) {
          clearTimeout(fallbackTimer);
          document.removeEventListener('visibilitychange', onHide);
        }
      };
      document.addEventListener('visibilitychange', onHide);

      // Triple-try: window.close() (rarely works in SFSafariViewController),
      // direct navigation, and a hidden iframe — some iOS contexts respect
      // an iframe src when the top-frame redirect is silently blocked.
      try { window.close(); } catch(_) {}
      try { window.location.href = 'talkbingo://home'; } catch(_) {}
      setTimeout(function(){
        try {
          var ifr = document.createElement('iframe');
          ifr.src = 'talkbingo://home';
          ifr.style.cssText = 'width:0;height:0;border:0;position:absolute;left:-9999px';
          document.body.appendChild(ifr);
          setTimeout(function(){ try { ifr.parentNode.removeChild(ifr); } catch(_) {} }, 600);
        } catch(_) {}
      }, 80);
      return;
    }
    // company: go to cammuplabs.com (제품 소개)
    if (ctx === 'company') {
      window.location.href = 'https://cammuplabs.com/products.html';
      return;
    }
    if (typeof window.__TB_ON_BACK === 'function') window.__TB_ON_BACK();
    else history.back();
  }

  // Desktop: zoom the two-board row to fit. Mobile: zoom each board to its ~86vw card.
  let TB_CONTENT_W = 0;
  function tbFit(){
    const root = document.documentElement;
    // Fit each board card by BOTH width (86vw / 390) and height (viewport − chrome / 844 frame),
    // so the whole board shows without the bottom getting cut off.
    var wFit = (window.innerWidth * 0.86 - 6) / 390;
    var hFit = (window.innerHeight - 90) / 844;
    root.style.setProperty('--cardz', String(Math.max(0.4, Math.min(1, wFit, hFit))));
    if (TB_CONTENT_W) root.style.setProperty('--z', String(Math.max(0.2, Math.min(1, (window.innerWidth - 8) / TB_CONTENT_W))));
  }
  function tbMeasure(){ const b = document.querySelector('.boards'); if (b && !TB_CONTENT_W){ document.documentElement.style.setProperty('--z','1'); TB_CONTENT_W = b.scrollWidth; } tbFit(); }
  window.addEventListener('resize', tbFit);
  setInterval(tbMeasure, 500);
  tbFit();

  let introLang = 'ko';
  function renderIntro(){
    const d = INTRO_I18N[introLang];
    document.getElementById('introSlogan').innerHTML = d.slogan;
    document.getElementById('introBtn').textContent = d.button;
    // Render chips + the overlay container in one shot. data-i indexes the
    // feature pair so we can swap the overlay text without re-rendering.
    const chips = d.features.map((f, i) =>
      '<span data-i="'+i+'">'+f[0]+'</span>'
    ).join('');
    const overlay =
      '<div class="fInfo" id="fInfo">' +
        '<button class="fClose" aria-label="close">×</button>' +
        '<h3 id="fInfoTitle"></h3>' +
        '<p id="fInfoBody"></p>' +
      '</div>';
    document.getElementById('introFeatures').innerHTML = chips + overlay;
    document.querySelectorAll('#langToggle button').forEach(b => b.classList.toggle('on', b.dataset.lang === introLang));
    bindFeatureChips();
  }

  // Feature-chip → overlay wiring. On first tap the overlay starts at the
  // tapped chip's bounding box and grows out to fill the 6-chip area
  // (Hub V4 expand). While open, tapping another chip cross-fades the
  // content (no shrink/regrow flicker). Same chip again, the X, or any
  // outside-click closes and resets back to the chip-sized state.
  function bindFeatureChips(){
    const wrap = document.querySelector('#intro .features');
    if (!wrap) return;
    const info  = wrap.querySelector('#fInfo');
    const title = wrap.querySelector('#fInfoTitle');
    const body  = wrap.querySelector('#fInfoBody');
    const closeBtn = wrap.querySelector('.fClose');
    const GROW_MS = 320; // keep in sync with the transition we apply inline

    function setContent(f){
      title.textContent = f[0];
      body.textContent  = f[1];
    }

    function growFromChip(chipEl){
      const chipRect = chipEl.getBoundingClientRect();
      const wrapRect = wrap.getBoundingClientRect();
      const startX = chipRect.left - wrapRect.left;
      const startY = chipRect.top  - wrapRect.top;
      // Compute the END box from the union of all chips' rects — using
      // `width: 100%` would collapse when the grid container's measured
      // width is 0 (some browsers / preview viewports), but the chips
      // themselves always lay out correctly so their union is a reliable
      // target.
      const chipsArr = wrap.querySelectorAll('span');
      let minL = Infinity, minT = Infinity, maxR = -Infinity, maxB = -Infinity;
      chipsArr.forEach(c => {
        const r = c.getBoundingClientRect();
        if (r.left   < minL) minL = r.left;
        if (r.top    < minT) minT = r.top;
        if (r.right  > maxR) maxR = r.right;
        if (r.bottom > maxB) maxB = r.bottom;
      });
      const endX = minL - wrapRect.left;
      const endY = minT - wrapRect.top;
      const endW = maxR - minL;
      const endH = maxB - minT;
      // 1) Pin overlay to the chip's box with NO transition so it lands
      //    there instantly.
      info.style.transition = 'none';
      info.style.left   = startX + 'px';
      info.style.top    = startY + 'px';
      info.style.width  = chipRect.width  + 'px';
      info.style.height = chipRect.height + 'px';
      info.style.opacity = '0.4';
      title.style.opacity = '0';
      body.style.opacity = '0';
      closeBtn.style.opacity = '0';
      info.classList.add('on');
      // 2) Force layout, then animate to the full 6-chip box on the next
      //    frame so the browser actually transitions the property change.
      //    `setTimeout(_, 16)` instead of requestAnimationFrame so this
      //    fires even when the tab is throttled (headless previews, etc.).
      info.getBoundingClientRect();
      setTimeout(() => {
        info.style.transition =
          'left '   + GROW_MS + 'ms cubic-bezier(.34,1.2,.5,1),' +
          ' top '   + GROW_MS + 'ms cubic-bezier(.34,1.2,.5,1),' +
          ' width ' + GROW_MS + 'ms cubic-bezier(.34,1.2,.5,1),' +
          ' height '+ GROW_MS + 'ms cubic-bezier(.34,1.2,.5,1),' +
          ' opacity 180ms ease';
        info.style.left   = endX + 'px';
        info.style.top    = endY + 'px';
        info.style.width  = endW + 'px';
        info.style.height = endH + 'px';
        info.style.opacity = '1';
        // Text/X fade in slightly after the box has grown.
        setTimeout(() => {
          title.style.opacity = '1';
          body.style.opacity = '1';
          closeBtn.style.opacity = '1';
        }, Math.round(GROW_MS * 0.55));
      }, 16);
    }

    function openInfo(i, chipEl){
      const f = INTRO_I18N[introLang].features[i];
      if (!f) return;
      const alreadyOpen = info.classList.contains('on');
      const sameChip = chipEl.classList.contains('on');
      if (alreadyOpen && sameChip){
        closeInfo();
        return;
      }
      if (alreadyOpen){
        // Cross-fade text only — overlay box is already at full size.
        title.style.opacity = '0';
        body.style.opacity  = '0';
        setTimeout(() => {
          setContent(f);
          title.style.opacity = '1';
          body.style.opacity  = '1';
        }, 130);
      } else {
        setContent(f);
        growFromChip(chipEl);
      }
      wrap.querySelectorAll('span').forEach(s => s.classList.toggle('on', s === chipEl));
    }

    function closeInfo(){
      if (!info.classList.contains('on')) return;
      info.classList.remove('on');
      wrap.querySelectorAll('span').forEach(s => s.classList.remove('on'));
      // Note: we intentionally DO NOT clear inline styles here. growFromChip()
      // overwrites every property on the next open, and clearing here was
      // racing with the grow timeout (close fires for non-obvious reasons
      // during the same tick on some browsers/headless previews, leaving the
      // overlay stuck at the chip-sized start state). Leaving stale inline
      // styles is harmless because display:none hides them.
    }

    wrap.querySelectorAll('span').forEach(s => {
      s.addEventListener('click', (e) => {
        e.stopPropagation();
        openInfo(parseInt(s.dataset.i, 10), s);
      });
    });
    closeBtn.addEventListener('click', (e) => { e.stopPropagation(); closeInfo(); });
    // Outside-click closes — registered once via .__fHandlerSet flag so
    // re-renders (language toggle) don't pile listeners up on document.
    if (!document.__fHandlerSet){
      document.addEventListener('click', (e) => {
        const w = document.querySelector('#intro .features');
        if (w && !w.contains(e.target)){
          const f = w.querySelector('#fInfo');
          if (f && f.classList.contains('on')){
            f.classList.remove('on');
            w.querySelectorAll('span').forEach(s => s.classList.remove('on'));
          }
        }
      });
      document.__fHandlerSet = true;
    }
  }
  function enterDemo(){
    if(window.__setDemoLang) window.__setDemoLang(introLang);
    document.getElementById('intro').classList.add('hide');
    window.__tbCurrentLang = introLang;
    scheduleChatTip();
  }
  document.querySelectorAll('#langToggle button').forEach(b => b.addEventListener('click', () => {
    introLang = b.dataset.lang;
    window.__tbCurrentLang = introLang;
    renderIntro();
    if(window.__setDemoLang) window.__setDemoLang(introLang);
  }));
  renderIntro();

  const TWEAK_DEFAULTS = { pressDepth:10, speed:100, particlesOn:true, keyboardOn:false, lang:'ko', hostName:'YOU', guestName:'친구' };
  // humorous bot answer pool (guest)
  window.__BOT_ANSWERS = ['안 막힌 도로 😮‍💨','어제의 나','떡볶이…','월요일 빼고 다','로또 1등','고양이 손'];
</script>
